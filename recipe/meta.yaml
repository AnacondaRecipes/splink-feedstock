{% set name = "splink" %}
{% set version = "4.0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/moj-analytical-services/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 91fc72e24e177bed3fa0b366d55f56c2317c0c39882af3490321ebcd7a47e1a2

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - poetry-core >=1.0.8
  run:
    - python
    - jsonschema >=3.2
    - pandas >1.3.5  # [py<313]
    - pandas >=2.2.3  # [py>=313]
    - duckdb >=0.9.2
    - sqlglot >=13.0.0
    - altair >=5.0.1  # [py<313]
    - altair >=5.5.0  # [py>=313]
    - jinja2 >=3.0.3
    - numpy >=1.17.3  # [py<312]
    - numpy >=1.26.0  # [py>=312]
    - python-igraph >=0.11.2
  run_constrained:
    - pyspark >=3.2.1
    - awswrangler >=3.0.0,<4.0.0
    - psycopg2 >=2.8.0

{% set skip_tests = "" %}

# Tests require igraph for the functionality - KeyError: 'is_bridge'
{% set skip_tests = skip_tests + " --deselect=tests/test_graph_metrics.py::test_is_bridge" %}

test:
  source_files:
    - tests
  imports:
    - splink
  requires:
    - pytest >=7.3
    - pyspark
    - psycopg2
    - sqlalchemy >=1.4.0
    - networkx >=2.5.1
    - rapidfuzz >=2.0.3
    # further constrain upper bound for the test due to dependency changes
    - sqlglot <24
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv -m "not spark_only" -k "not postgres and not spark" {{ skip_tests }} tests
  

about:
  home: https://github.com/moj-analytical-services/splink
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Fast, accurate and scalable probabilistic data linkage with support for multiple SQL backends
  description: |
    Splink is a Python package for probabilistic record linkage (entity resolution) that allows
    you to deduplicate and link records from datasets without unique identifiers.
  dev_url: https://github.com/moj-analytical-services/splink
  doc_url: https://moj-analytical-services.github.io/splink

extra:
  recipe-maintainers:
    - ThomasHepworth
    - ADBond
    - cdesouza21
