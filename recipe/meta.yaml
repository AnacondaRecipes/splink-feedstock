{% set name = "splink" %}
{% set version = "4.0.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 84f4ad5a1d86c42837de60b662904c74ba27b1a8c6dde2042551dcc57ade5f25

build:
  skip: true  # [py<38]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - poetry-core >=1.0.8
  run:
    - python
    - jsonschema >=3.2
    - pandas >1.3.5  # [py<313]
    - pandas >=2.2.3  # [py>=313]
    - duckdb >=0.9.2
    - sqlglot >=13.0.0
    - altair >=5.0.1  # [py<313]
    - altair >=5.5.0  # [py>=313]
    - jinja2 >=3.0.3
    - numpy >=1.17.3  # [py<312]
    - numpy >=1.26.0  # [py>=312]
  run_constrained:
    - pyspark >=3.2.1
    - awswrangler >=3.0.0,<4.0.0
    - psycopg2-binary >=2.8.0
    - igraph >=0.11.2
test:
  imports:
    - splink
  

about:
  home: https://github.com/moj-analytical-services/splink
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Fast, accurate and scalable probabilistic data linkage with support for multiple SQL backends
  description: |
    Splink is a Python package for probabilistic record linkage (entity resolution) that allows
    you to deduplicate and link records from datasets without unique identifiers.
  dev_url: https://github.com/moj-analytical-services/splink
  doc_url: https://moj-analytical-services.github.io/splink

extra:
  recipe-maintainers:
    - ThomasHepworth
    - ADBond
    - cdesouza21
